# Demo overlay — release build for fast runtime, no hot-reload.
# Layers on top of dev (same seeds, keycloak).
# Usage: make demo

services:
  server:
    # Build the `fossil` binary in release too (the dev image defaults to debug
    # for fast iteration — see server/Dockerfile.dev). Demos want representative
    # runtime speed, matching the release keasy-server below.
    build:
      args:
        FOSSIL_BUILD_PROFILE: release
    command: ["cargo", "run", "--release"]
    environment:
      RUST_LOG: info
      KEASY_CORS_ORIGINS: "http://localhost:3000"
