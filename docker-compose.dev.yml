# Development overlay — hot reload, demo data, relaxed healthchecks.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server/src:/app/src
      - server-target:/app/target
      - ./infra/seeds/dev-seed.sql:/seed/init.sql:ro
    environment:
      KEASY_SEED_FILE: /seed/init.sql
      KEASY_BASE_DOMAIN: ${KEASY_BASE_DOMAIN:-keasy.local}
      KEASY_GXDCH_MOCK: "true"
      RUST_LOG: debug
      POLARS_MAX_THREADS: "2"
    healthcheck:
      interval: 10s
      retries: 30
      start_period: 120s        # first Rust compile is slow

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  caddy:
    depends_on:
      server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      # web: no hard dependency — avoids startup deadlocks during HMR init

  # MinIO is the dev surrogate for S3/GCS/Azure. Same code path as prod
  # (connector type "s3" with custom endpoint). Bucket is pre-created and
  # CORS-enabled by the minio-init sidecar so DuckDB-WASM in the browser
  # can do range reads against presigned URLs.
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: keasy-dev
      MINIO_ROOT_PASSWORD: keasy-dev-password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/seeds/minio-cors.json:/tmp/cors.json:ro
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 keasy-dev keasy-dev-password &&
        mc mb --ignore-existing local/keasy-dev &&
        mc cors set local/keasy-dev /tmp/cors.json
      "

volumes:
  server-target:                   # persist Rust build cache across restarts
  minio-data:
