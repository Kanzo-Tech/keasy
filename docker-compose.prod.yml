# Production overlay — optimized builds, no seed data.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      KEASY_DEV_SEED: "false"
      KEASY_BASE_DOMAIN: ${KEASY_BASE_DOMAIN:-}
      KEASY_WALT_ID_ISSUER_URL: ${KEASY_WALT_ID_ISSUER_URL:-}
      RUST_LOG: info

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  caddy:
    build:
      context: ./infra/caddy
      dockerfile: Dockerfile
    volumes:
      - ./infra/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
    environment:
      KEASY_BASE_DOMAIN: ${KEASY_BASE_DOMAIN:-localhost}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
