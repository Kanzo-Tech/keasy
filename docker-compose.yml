# Base compose — shared config for all environments.
# Use with an overlay: docker compose -f docker-compose.yml -f docker-compose.{dev,prod}.yml up

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  keycloak-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-changeme}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    # Pinned to 26.2 — 26.5.x regressed on realm import of an organizations-enabled
    # realm (duplicate manage-organizations → "Duplicate resource error"). We don't
    # need 26.5: the org-invite-by-email flow (W2) works since Organizations GA (26.0).
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme}
      KC_HOSTNAME: http://localhost:3000/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-changeme}
      KC_PROXY_HEADERS: xforwarded
      KEASY_OIDC_CLIENT_SECRET: ${KEASY_OIDC_CLIENT_SECRET:-keasy-dev-secret}
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── Application ─────────────────────────────────────────────────────────────

  server:
    ports:
      - "8080:8080"
    environment:
      KEASY_API_KEY: dev-key
      KEASY_BIND_ADDR: "0.0.0.0:8080"
      KEASY_DATA_DIR: /var/lib/keasy
      # The catalog's DuckDB `azure`/`httpfs` extensions verify TLS via libcurl /
      # OpenSSL, which don't auto-find the debian CA bundle — point them at it so
      # reading remote Parquet footers (registration) doesn't fail with
      # "Problem with the SSL CA cert". Both images carry ca-certificates here.
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      # DEV-ONLY placeholders. Prod injects both as Swarm secrets (*_FILE); never
      # commit a real secret here. Override locally via .env (gitignored) or
      # `KEASY_SESSION_SECRET=$(openssl rand -base64 64) docker compose up`.
      KEASY_SECRET_KEY: ${KEASY_SECRET_KEY:-dev-only-insecure-secret-key-change-me}
      KEASY_SESSION_SECRET: ${KEASY_SESSION_SECRET:-dev-only-insecure-session-secret-change-me}
      KEASY_BASE_URL: http://localhost:3000
      KEASY_OIDC_ISSUER_URL: http://localhost:3000/auth/realms/keasy
      KEASY_OIDC_CLIENT_ID: keasy-server
      KEASY_OIDC_CLIENT_SECRET: ${KEASY_OIDC_CLIENT_SECRET:-keasy-dev-secret}
      KEASY_OIDC_INTERNAL_BASE_URL: http://keycloak:8080
    volumes:
      - keasy-data:/var/lib/keasy
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz/live"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  web:
    environment:
      KEASY_API_URL: http://server:8080
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  keasy-data:
  keycloak-postgres-data:
