# Base compose — shared config for all environments.
# Use with an overlay: docker compose -f docker-compose.yml -f docker-compose.{dev,prod}.yml up

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  keycloak-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-changeme}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    # Boots EMPTY — the realm is provisioned declaratively by the keycloak-realm
    # (terraform) service below, the SAME config prod applies. Pinned to 26.2 (26.5.x
    # regressed on org-enabled realms); Organizations GA since 26.0.
    image: ${KEASY_KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.2}
    command: ["start-dev"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme}
      KC_HOSTNAME: http://localhost:3000/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-changeme}
      KC_PROXY_HEADERS: xforwarded
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── Realm provisioning (declarative — the same Terraform config as prod) ─────
  # One-shot: mint the least-privilege keasy-terraform client (only create-realm), then
  # `terraform apply` the realm. Both exit after running; idempotent on re-up.
  kc-mint:
    image: ${KEASY_KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.2}
    restart: "no"
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        kc(){ /opt/keycloak/bin/kcadm.sh "$$@"; }
        until kc config credentials --server http://keycloak:8080/auth --realm master \
            --user admin --password "$$KC_ADMIN_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for keycloak..."; sleep 3; done
        cid=$$(kc get clients -r master -q clientId=keasy-terraform --fields id --format csv --noquotes || true)
        if [ -z "$$cid" ]; then
          kc create clients -r master -s clientId=keasy-terraform -s enabled=true \
            -s publicClient=false -s serviceAccountsEnabled=true -s standardFlowEnabled=false \
            -s secret="$$KC_TF_CLIENT_SECRET"
        else
          kc update "clients/$$cid" -r master -s secret="$$KC_TF_CLIENT_SECRET"
        fi
        kc add-roles -r master --uusername service-account-keasy-terraform --rolename create-realm || true
        echo "keasy-terraform ready"
    environment:
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-changeme}
      KC_TF_CLIENT_SECRET: ${KC_TF_CLIENT_SECRET:-keasy-tf-dev-secret}
    depends_on:
      keycloak:
        condition: service_healthy

  keycloak-realm:
    image: ${KEASY_TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
    restart: "no"
    working_dir: /work
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - terraform init -input=false && terraform apply -input=false -auto-approve
    volumes:
      - ./infra/keycloak/terraform:/work
    environment:
      TF_VAR_kc_url: http://keycloak:8080
      TF_VAR_tf_client_secret: ${KC_TF_CLIENT_SECRET:-keasy-tf-dev-secret}
      TF_VAR_cp_oidc_secret: ${CP_OIDC_SECRET:-keasy-cp-dev-secret}
      TF_VAR_server_oidc_secret: ${KEASY_OIDC_CLIENT_SECRET:-keasy-dev-secret}
    depends_on:
      kc-mint:
        condition: service_completed_successfully

  # ── Application ─────────────────────────────────────────────────────────────

  server:
    ports:
      - "8080:8080"
    environment:
      KEASY_API_KEY: dev-key
      KEASY_BIND_ADDR: "0.0.0.0:8080"
      KEASY_DATA_DIR: /var/lib/keasy
      # The catalog's DuckDB `azure`/`httpfs` extensions verify TLS via libcurl /
      # OpenSSL, which don't auto-find the debian CA bundle — point them at it so
      # reading remote Parquet footers (registration) doesn't fail with
      # "Problem with the SSL CA cert". Both images carry ca-certificates here.
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      # DEV-ONLY placeholders. Prod injects both as Swarm secrets (*_FILE); never
      # commit a real secret here. Override locally via .env (gitignored) or
      # `KEASY_SESSION_SECRET=$(openssl rand -base64 64) docker compose up`.
      KEASY_SECRET_KEY: ${KEASY_SECRET_KEY:-dev-only-insecure-secret-key-change-me}
      KEASY_SESSION_SECRET: ${KEASY_SESSION_SECRET:-dev-only-insecure-session-secret-change-me}
      KEASY_BASE_URL: http://localhost:3000
      KEASY_OIDC_ISSUER_URL: http://localhost:3000/auth/realms/keasy
      KEASY_OIDC_CLIENT_ID: keasy-server
      KEASY_OIDC_CLIENT_SECRET: ${KEASY_OIDC_CLIENT_SECRET:-keasy-dev-secret}
      KEASY_OIDC_INTERNAL_BASE_URL: http://keycloak:8080
    volumes:
      - keasy-data:/var/lib/keasy
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-realm:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz/live"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  web:
    environment:
      KEASY_API_URL: http://server:8080
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  keasy-data:
  keycloak-postgres-data:
