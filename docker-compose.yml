services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      KEASY_API_KEY: dev-key
      KEASY_BIND_ADDR: "0.0.0.0:8080"
      KEASY_MAX_CONCURRENT_JOBS: "4"
      KEASY_DATA_DIR: /var/lib/keasy
      KEASY_SECRET_KEY: ${KEASY_SECRET_KEY:-change-me-in-production}
      KEASY_SESSION_SECRET: "8VVnhO7zkhlc+oelkbjrKnlpkz4S2+HCQLOnz9/gnR/Rwlc2/8gZe+W7EURQDUa53j8oP+miZ5MpMuL4ZLvjoA=="
      RUST_LOG: debug
      # SMTP config (optional — if not set, invite links are logged to console)
      # KEASY_SMTP_HOST: smtp.example.com
      # KEASY_SMTP_PORT: "587"
      # KEASY_SMTP_USER: user
      # KEASY_SMTP_PASS: pass
      # KEASY_SMTP_FROM: noreply@keasy.local
      KEASY_BASE_URL: http://localhost:3000
      # Walt.id Verifier sidecar URL — only relevant when running with --profile walt-id
      KEASY_WALT_ID_VERIFIER_URL: http://waltid-verifier-api:7003
    volumes:
      - keasy-data:/var/lib/keasy

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      KEASY_API_URL: http://server:8080
      KEASY_API_KEY: dev-key
    depends_on:
      server:
        condition: service_healthy

  waltid-wallet-api:
    image: waltid/wallet-api:0.17.1
    profiles: [walt-id]
    ports:
      - "7001:7001"
    volumes:
      - waltid-wallet-data:/waltid-wallet-api/data

  waltid-issuer-api:
    image: waltid/issuer-api:0.17.1
    profiles: [walt-id]
    ports:
      - "7002:7002"
    volumes:
      - waltid-issuer-data:/waltid-issuer-api/data

  waltid-verifier-api:
    image: waltid/verifier-api:0.17.1
    profiles: [walt-id]
    ports:
      - "7003:7003"
    volumes:
      - waltid-verifier-data:/waltid-verifier-api/config

  waltid-web-wallet:
    image: waltid/waltid-web-wallet:0.17.1
    profiles: [walt-id]
    ports:
      - "7101:7101"

  waltid-web-portal:
    image: waltid/web-portal:0.17.1
    profiles: [walt-id]
    ports:
      - "7102:7102"

volumes:
  keasy-data:
  waltid-wallet-data:
  waltid-issuer-data:
  waltid-verifier-data:
