# Shared Swarm base stack — the keasy fleet's edge + identity.
#
#   docker stack deploy -c infra/stack/base.yml keasy-base
#
# The per-tenant stacks are rendered + deployed by the provisioner CLI (the
# `keasy-control-plane` image, run on a manager via infra/stack/cp.sh — NOT a
# service in this stack) and attach to the shared `keasy-edge` overlay, which is
# EXTERNAL (created once by bootstrap.sh, not owned by this stack — see the networks
# section). Traefik discovers every service by its `deploy.labels` — adding a tenant
# needs no edit to this file. See infra/stack/README.md for the one-time bootstrap
# (swarm init, overlay network, base secrets).
#
# Required env (interpolated by `docker stack deploy`; bootstrap.sh sources .env +
# versions.env and generates KC_DB_PASSWORD / KC_ADMIN_PASSWORD):
#   KC_HOSTNAME            e.g. auth.keasy.example.com   (Keycloak's public host)
#   KEASY_BASE_DOMAIN      e.g. keasy.example.com         (tenants at <slug>.<this>)
#   ACME_EMAIL             Let's Encrypt registration email
#   KEASY_KEYCLOAK_IMAGE   quay.io/keycloak/keycloak:<ver>   (pinned in versions.env)
# (The keasy-server/web/control-plane image pins are consumed by cp.sh, not this stack.)
version: "3.9"

services:
  # ── Ingress: Traefik v3 (Swarm provider + automatic TLS) ────────────────────
  traefik:
    # v3.3's swarm provider talks Docker API 1.24, which Docker 25+/29 rejects
    # ("client version 1.24 is too old") → reads no services, every route 404s.
    # v3.5 negotiates the modern API; DOCKER_API_VERSION pins it as a belt-and-
    # suspenders so it works on any recent daemon.
    image: traefik:v3.5
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=keasy-edge
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/letsencrypt
    networks: [keasy-edge]
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any

  # ── Identity: Keycloak + its Postgres ───────────────────────────────────────
  keycloak-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/kc-db-password
    secrets: [kc-db-password]
    volumes:
      - keycloak-postgres:/var/lib/postgresql/data
    networks: [keasy-edge]
    # pg_isready ships in the image → a non-fragile readiness signal Swarm can see.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      # Stateful single-volume service: there must NEVER be two postmasters on the
      # same data dir at once (the second invalidates the first's lock file → both
      # take an immediate shutdown). One replica, one per node, stop-the-old-before-
      # starting-the-new on every update.
      replicas: 1
      placement:
        max_replicas_per_node: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: any

  # Keycloak boots EMPTY — the realm is provisioned declaratively by Terraform
  # (infra/keycloak/terraform, applied by infra/stack/tf.sh) against the admin API after
  # this stack is up. A realm CREATED via the API auto-creates the built-in client scopes
  # (roles, web-origins, …), so we never hand-maintain them — which is what killed the old
  # "--import-realm dropped the `roles` scope → 403" class of bug. `terraform apply`
  # reconciles in place, so a realm change no longer needs a Postgres volume wipe.
  # Pinned (KEASY_KEYCLOAK_IMAGE, versions.env) to 26.2: 26.5.x regressed on org-enabled
  # realms. Organizations GA since 26.0, which is all the invite-by-email flow needs.
  keycloak:
    image: ${KEASY_KEYCLOAK_IMAGE}
    command: ["start"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      # Keycloak does NOT honour the `_FILE` suffix for these — pass the values
      # directly (the bootstrap has them in .env and interpolates them here).
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: "https://${KC_HOSTNAME}/auth"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # The bootstrap admin is used only to mint the keasy-terraform client
      # (kc-mint-tf-client.sh); Terraform then authenticates as that dedicated client.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    networks: [keasy-edge]
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        # Single-node identity service over one Postgres: never let two tasks overlap —
        # stop the old before starting the new (brief auth blip on update).
        order: stop-first
      restart_policy:
        # Keycloak does not retry the initial DB connect; on a cold boot it may lose
        # the race with Postgres and exit. Swarm just restarts it — the delay paces
        # the retries so it isn't hammering a DB that is still coming up.
        condition: any
        delay: 5s
      labels:
        traefik.enable: "true"
        traefik.docker.network: keasy-edge
        traefik.http.routers.keycloak.rule: "Host(`${KC_HOSTNAME}`)"
        traefik.http.routers.keycloak.entrypoints: websecure
        traefik.http.routers.keycloak.tls.certresolver: le
        traefik.http.services.keycloak.loadbalancer.server.port: "8080"

  # ── Provisioning ─────────────────────────────────────────────────────────
  # There is NO control-plane service. Provisioning is operator-driven: the
  # `keasy-control-plane` image is a CLI (`provision`/`deprovision`/`reconcile`/
  # `list`), run on a manager via `infra/stack/cp.sh` (see Makefile + README).
  # The Keycloak Organizations are the source of truth for the tenant fleet — no
  # local registry, no git inventory.

secrets:
  kc-db-password:
    external: true
  kc-admin-password:
    external: true

volumes:
  traefik-acme:
  keycloak-postgres:

networks:
  # External, NOT owned by this stack: it is the shared fabric for the base stack,
  # every per-tenant stack (which also declares it `external`), and the cp.sh
  # one-shot (`docker run --network keasy-edge`). bootstrap.sh creates it once. If
  # the base stack owned it, `docker stack rm keasy-base` would try to delete a
  # network still in use by live tenants — racing the overlay GC and failing with
  # "network in use". Externalizing it removes that whole failure class.
  keasy-edge:
    external: true
    name: keasy-edge
